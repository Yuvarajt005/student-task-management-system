<!DOCTYPE html>
<html>
<head>
    <title>Student Productivity Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .navbar h2 {
            font-size: 20px;
        }

        .navbar button {
            padding: 8px 15px;
            margin-left: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #ff4b5c;
            color: white;
        }

        /* DASHBOARD CARDS */
        .dashboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 15px;
            width: 150px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .card h3 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        /* ADD TASK */
        .container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            margin: 30px auto;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button.add-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button.add-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>📘 Student Task System</h2>
    <div>
        <button onclick="goToTasks()">Tasks</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard">
    <div class="card">
        <h3 id="totalTasks">0</h3>
        <p>Total Tasks</p>
    </div>

    <div class="card">
        <h3 id="completedTasks">0</h3>
        <p>Completed</p>
    </div>

    <div class="card">
        <h3 id="pendingTasks">0</h3>
        <p>Pending</p>
    </div>
</div>

<!-- QUICK ADD -->
<div class="container">
    <h3>Quick Add Task</h3>

    <input id="title" placeholder="Task Title">
    <input id="desc" placeholder="Description">
    <input type="date" id="date">

    <button class="add-btn" onclick="addTask()">Add Task</button>
</div>

<script>
let user_id = localStorage.getItem("user_id");

/* LOAD DASHBOARD */
function loadDashboard() {
    fetch(`/get_tasks/${user_id}`)
    .then(res => res.json())
    .then(data => {

        let total = data.length;
        let completed = data.filter(t => t.status === "completed").length;

        document.getElementById("totalTasks").innerText = total;
        document.getElementById("completedTasks").innerText = completed;
        document.getElementById("pendingTasks").innerText = total - completed;
    });
}

/* ADD TASK */
function addTask() {
    fetch('/add_task', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            user_id: user_id,
            task_title: title.value,
            description: desc.value,
            due_date: date.value
        })
    })
    .then(() => {
        alert("Task Added");
        loadDashboard();
    });
}

/* NAVIGATION */
function goToTasks() {
    // ✅ FIXED (no separate page, scroll to add task section)
    document.querySelector(".container").scrollIntoView({ behavior: "smooth" });
}

function logout() {
    localStorage.removeItem("user_id");
    window.location.href = "/login_page";
}

loadDashboard();
</script>

</body>
</html>
