<!DOCTYPE html>
<html>
<head>
    <title>Student Task System - Register</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        /* Glass Card */
        .register-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 35px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            color: white;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        input::placeholder {
            color: #ddd;
        }

        .password-box {
            position: relative;
        }

        .toggle {
            position: absolute;
            right: 12px;
            top: 14px;
            cursor: pointer;
            font-size: 12px;
            color: #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .msg {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        .error { color: #ff6b6b; }
        .success { color: #00ffcc; }

        a {
            color: #00f2fe;
            text-decoration: none;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="register-box">
    <h2>📝 Create Account</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="email" id="email" placeholder="Enter Email">

    <div class="password-box">
        <input type="password" id="password" placeholder="Enter Password">
        <span class="toggle" onclick="togglePassword('password')">Show</span>
    </div>

    <div class="password-box">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
        <span class="toggle" onclick="togglePassword('confirmPassword')">Show</span>
    </div>

    <button id="registerBtn" onclick="register()">Register</button>

    <div id="msg" class="msg"></div>

    <p style="margin-top:15px;">
        Already have an account? <a href="/login_page">Login</a>
    </p>
</div>

<script>
function togglePassword(id) {
    let field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
}

function register() {
    let name = document.getElementById('name').value;
    let email = document.getElementById('email').value;
    let password = document.getElementById('password').value;
    let confirmPassword = document.getElementById('confirmPassword').value;

    let msg = document.getElementById('msg');
    let btn = document.getElementById('registerBtn');

    if (!name || !email || !password || !confirmPassword) {
        msg.innerText = "All fields are required";
        msg.className = "msg error";
        return;
    }

    if (password !== confirmPassword) {
        msg.innerText = "Passwords do not match";
        msg.className = "msg error";
        return;
    }

    btn.innerText = "Registering...";
    btn.disabled = true;

    fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
    })
    .then(res => res.json())
    .then(data => {

        if (data.message && data.message.toLowerCase().includes("success")) {
            msg.innerText = "Registration successful! Redirecting...";
            msg.className = "msg success";

            setTimeout(() => {
                window.location.href = "/login_page";
            }, 1500);
        } else {
            msg.innerText = data.message || "Registration failed";
            msg.className = "msg error";
        }

        btn.innerText = "Register";
        btn.disabled = false;
    });
}
</script>

</body>
</html>
